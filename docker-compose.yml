# =============================================================================
# Hermes Agent v0.13.0 — AI Agent Container for EasyPanel (ARM64)
# =============================================================================
# Usage:
#   docker compose up -d
#   docker exec -it hermes-agent bash
#   hermes setup
# =============================================================================

services:
  hermes-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes-agent:arm64
    container_name: hermes-agent
    volumes:
      - hermes-data:/opt/data
    ports:
      - "3000:3000"
      - "8642:8642"
    init: true
    restart: unless-stopped

volumes:
  hermes-data:
    driver: local
